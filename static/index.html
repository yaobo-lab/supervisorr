<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>supervisord</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            color: #4f5b6b;
            background: #f5f7fa;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: #f5f7fa;
            font-size: 13px;
        }

        .page {
            width: 100%;
            padding: 0;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            background: #fff;
            border-top: 1px solid #e5e9f0;
            border-bottom: 1px solid #e5e9f0;
        }

        table {
            width: 100%;
            min-width: 1120px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            height: 38px;
            padding: 0 12px;
            color: #8492a6;
            background: #f3f5f8;
            border-bottom: 1px solid #dfe5ed;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
        }

        td {
            height: 41px;
            padding: 0 12px;
            color: #465366;
            border-bottom: 1px solid #e5e9f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tbody tr:nth-child(even) { background: #fafbfd; }
        tbody tr:hover { background: #f1f6ff; }
        tbody tr:last-child td { border-bottom: 0; }

        .col-actions { width: 112px; }
        .col-name { width: 150px; }
        .col-status { width: 180px; }
        .col-mem { width: 105px; }
        .col-command { width: 240px; }
        .col-directory { width: 230px; }
        .col-bool { width: 105px; }

        .action {
            appearance: none;
            padding: 0;
            border: 0;
            background: none;
            color: #409eff;
            cursor: pointer;
            font: inherit;
        }

        .action + .action { margin-left: 14px; }
        .action:hover { color: #1f78d1; text-decoration: underline; }
        .action:disabled { color: #b8c3d1; cursor: wait; text-decoration: none; }

        .status-running { color: #28a76f; }
        .status-stopped, .status-exited, .status-failed { color: #e66a6a; }
        .boolean-yes { color: #28a76f; }
        .boolean-no { color: #9aa7b8; }

        .empty, .error {
            padding: 32px;
            text-align: center;
            background: #fff;
            color: #9aa7b8;
        }

        .error { color: #e66a6a; }
    </style>
</head>
<body>
    <main class="page">
        <div class="table-wrap">
            <table aria-label="Managed processes">
                <thead>
                    <tr>
                        <th class="col-actions">actions</th>
                        <th class="col-name">name</th>
                        <th class="col-status">status</th>
                        <th class="col-mem">mem</th>
                        <th class="col-command">command</th>
                        <th class="col-directory">directory</th>
                        <th class="col-bool">autostart</th>
                        <th class="col-bool">autorestart</th>
                    </tr>
                </thead>
                <tbody id="process-rows"></tbody>
            </table>
            <div id="message" class="empty">Loading processes...</div>
        </div>
    </main>

    <script>
        const rows = document.getElementById("process-rows");
        const message = document.getElementById("message");

        function formatMemory(megabytes) {
            if (megabytes === null || megabytes === undefined) return "-";
            return `${Number(megabytes).toFixed(1)} MB`;
        }

        function appendCell(row, value, className, title) {
            const cell = document.createElement("td");
            if (className) cell.className = className;
            cell.textContent = value;
            cell.title = title ?? value;
            row.appendChild(cell);
            return cell;
        }

        function booleanCell(row, value) {
            appendCell(
                row,
                value ? "true" : "false",
                value ? "boolean-yes" : "boolean-no"
            );
        }

        function actionButton(action, target) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "action";
            button.textContent = action;
            button.addEventListener("click", async () => {
                button.disabled = true;
                try {
                    const response = await fetch("/api/action", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action, target })
                    });
                    const result = await response.json();
                    if (!result.success) throw new Error(result.error || "Action failed");
                    await fetchStatus();
                } catch (error) {
                    message.className = "error";
                    message.textContent = error.message;
                    message.hidden = false;
                } finally {
                    button.disabled = false;
                }
            });
            return button;
        }

        function renderProcesses(processes) {
            rows.replaceChildren();
            message.hidden = processes.length > 0;
            message.className = "empty";
            message.textContent = "No processes configured.";

            for (const process of processes) {
                const row = document.createElement("tr");

                const actions = document.createElement("td");
                actions.append(
                    actionButton("start", process.name),
                    actionButton("stop", process.name)
                );
                row.appendChild(actions);

                appendCell(row, process.name);
                const statusClass = `status-${process.status.split(" ", 1)[0].toLowerCase()}`;
                appendCell(row, process.status, statusClass);
                appendCell(row, formatMemory(process.mem));
                appendCell(row, process.command || "-");
                appendCell(row, process.directory || "-");
                booleanCell(row, process.autostart);
                booleanCell(row, process.autorestart);

                rows.appendChild(row);
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch("/api/status", { cache: "no-store" });
                if (!response.ok) throw new Error(`Status request failed: ${response.status}`);
                renderProcesses(await response.json());
            } catch (error) {
                message.className = "error";
                message.textContent = error.message;
                message.hidden = false;
            }
        }

        fetchStatus();
    </script>
</body>
</html>
